<?xml version="1.0" encoding="UTF-8"?>
<!--
  cm-mark-amber.svg — two-color variant.
  Same geometry as cm-mark.svg, but the Σ apex (the M's two central diagonals)
  and the orchestrator node pop in amber #d4a017. The body stays near-black.

  Use this for og:image, /about hero, /proof hero, and any context that has
  a known-dark or known-light background (so currentColor can be set per use).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CM — Christian Macion, Quant Researcher">
  <title>CM monogram (amber accent)</title>
  <desc>Sigmoid C + Σ-peaked M in near-black with amber accents on Σ apex and orchestrator node.</desc>

  <!-- C : sigmoid, body near-black -->
  <path d="M 22 48 C 10 46, 10 18, 22 16"
        fill="none"
        stroke="#0a0e14"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- M : outer legs in near-black; Σ apex diagonals in amber -->
  <g fill="none" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <polyline points="28,48 28,18" stroke="#0a0e14"/>
    <polyline points="28,18 40,34 52,18" stroke="#d4a017"/>
    <polyline points="52,18 52,48" stroke="#0a0e14"/>
  </g>

  <!-- Agent-graph nodes: orchestrator (amber, larger) + 2 workers (near-black, small) -->
  <circle cx="46" cy="41" r="1.8" fill="#d4a017"/>
  <circle cx="50" cy="30" r="1.0" fill="#0a0e14"/>
  <circle cx="50" cy="46" r="1.0" fill="#0a0e14"/>

  <!-- Ticker baseline : 8 ticks, near-black -->
  <g stroke="#0a0e14" stroke-width="1" stroke-linecap="butt">
    <line x1="28" y1="56" x2="28" y2="52"/>
    <line x1="31" y1="56" x2="31" y2="50"/>
    <line x1="34" y1="56" x2="34" y2="54"/>
    <line x1="37" y1="56" x2="37" y2="51"/>
    <line x1="40" y1="56" x2="40" y2="53"/>
    <line x1="43" y1="56" x2="43" y2="50"/>
    <line x1="46" y1="56" x2="46" y2="52"/>
    <line x1="49" y1="56" x2="49" y2="51"/>
  </g>
</svg>