# .github/workflows/lighthouse.yml — weekly Lighthouse CI run on the deployed site.
#
# Why: This portfolio targets WFH QR/AI hiring managers. Lighthouse perf and SEO
# scores are a load-bearing trust signal (they appear in the trust-strip). A
# weekly run catches regressions before a hiring manager does.
#
# Strategy: a minimal lighthouse-ci run against the GitHub Pages URL using
# @lhci/cli's `autorun`. Threshold assertions are kept loose (warn-only) to
# avoid noise from a 3rd-party hosted image CDN; the report is the artifact.
name: Lighthouse

on:
  schedule:
    # Mondays 07:00 UTC (~15:00 PHT) — after a quiet weekend of content edits.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: read
  id-token: none

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm install --no-save @lhci/cli
      - name: Authorise against GitHub Pages
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: |
          cat > lighthouserc.json <<'EOF'
          {
            "ci": {
              "collect": {
                "url": [
                  "https://christianmacion26.github.io/portfolio/",
                  "https://christianmacion26.github.io/portfolio/projects/",
                  "https://christianmacion26.github.io/portfolio/chat/"
                ],
                "numberOfRuns": 1
              },
              "assert": {
                "preset": "lighthouse:no-pwa",
                "assertions": {
                  "categories:performance": ["warn", { "minScore": 0.85 }],
                  "categories:accessibility": ["error", { "minScore": 0.95 }],
                  "categories:best-practices": ["warn", { "minScore": 0.90 }],
                  "categories:seo": ["error", { "minScore": 0.95 }]
                }
              }
            }
          }
          EOF
      - name: Run Lighthouse CI
        run: npx -y @lhci/cli@0.14.x autorun
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci
          retention-days: 30
