# Dependabot — keep deps + GH Actions current with zero CI cost.
# Runs in GitHub's own infrastructure; never touches our CI minutes.
# Each Monday it scans for npm + GitHub Actions updates and opens PRs.

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    # Bundle minor/patch updates into a single weekly PR to cut review noise;
    # major bumps land individually so they get full attention.
    groups:
      patch-and-minor:
        patterns: ['*']
        update-types: ['minor', 'patch']
    # Skip framework majors for now — pinned Astro 5.x; majors are manual.
    ignore:
      - dependency-name: 'astro'
        update-types: ['version-update:semver-major']
      - dependency-name: '@astrojs/*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 3
    groups:
      actions-patch-and-minor:
        patterns: ['*']
        update-types: ['minor', 'patch']
